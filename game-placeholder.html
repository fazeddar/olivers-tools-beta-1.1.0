<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Game Placeholder</title>
    <style>
        :root {
            color-scheme: dark;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at 20% 10%, rgba(99, 102, 241, 0.28), transparent 40%),
                        linear-gradient(140deg, #0b1020, #111827 55%, #0a0f1a);
            color: #eef2ff;
        }

        .card {
            width: min(560px, 90vw);
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
        }

        h1 {
            margin: 0 0 10px;
            font-size: clamp(1.2rem, 3.2vw, 1.8rem);
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        p {
            margin: 8px 0;
            opacity: 0.92;
            line-height: 1.5;
        }

        .pill {
            display: inline-block;
            margin-top: 8px;
            padding: 6px 12px;
            border-radius: 999px;
            border: 1px solid rgba(129, 140, 248, 0.58);
            background: rgba(129, 140, 248, 0.16);
            font-size: 0.85rem;
            letter-spacing: 0.03em;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <main class="card">
        <h1>Game Placeholder</h1>
        <p>This is where your game page will load.</p>
        <p>Replace this file or route each section to its own game file later.</p>
        <span class="pill" id="sectionTag">Section: ?</span>
    </main>

    <script>
        const params = new URLSearchParams(window.location.search);
        const section = (params.get('section') || '?').trim();
        const tag = document.getElementById('sectionTag');
        if (tag) {
            tag.textContent = `Section: ${section}`;
        }
    </script>
</body>
</html>
